<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
  </head>
  <body>
    <h1>Đặt hàng</h1>

    <label for="search">Tìm sản phẩm:</label>
    <input list="products" id="search" placeholder="Nhập tên sản phẩm" />
    <datalist id="products">
      <option value="iPhone 16"></option>
      <option value="Samsung S24"></option>
      <option value="Xiaomi 14"></option>
    </datalist>

    <h2>Giỏ hàng</h2>

    <table border="1">
      <thead>
        <tr>
          <th>STT</th>
          <th>Sản phẩm</th>
          <th>Đơn giá</th>
          <th>Số lượng</th>
          <th>Thành tiền</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>iPhone 16</td>
          <td>20.000.000</td>
          <td>1</td>
          <td>20.000.000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Samsung S24</td>
          <td>18.000.000</td>
          <td>1</td>
          <td>18.000.000</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Xiaomi 14</td>
          <td>12.000.000</td>
          <td>1</td>
          <td>12.000.000</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="4"><strong>Tổng cộng</strong></td>
          <td><output>50.000.000</output></td>
        </tr>
      </tfoot>
    </table>

    <p>Điểm tích lũy:</p>
    <meter value="70" min="0" max="100"></meter>

    <h2>Thanh toán</h2>

    <form>
      <p>Phương thức thanh toán:</p>
      <input type="radio" id="cod" name="payment" value="cod" required />
      <label for="cod">COD</label>

      <input type="radio" id="bank" name="payment" value="bank" />
      <label for="bank">Chuyển khoản</label>

      <input type="radio" id="ewallet" name="payment" value="ewallet" />
      <label for="ewallet">Ví điện tử</label>

      <br /><br />

      <label for="coupon">Mã giảm giá:</label><br />
      <input
        type="text"
        id="coupon"
        name="coupon"
        pattern="SALE[0-9]{4}"
        placeholder="VD: SALE2026"
      />

      <br /><br />

      <label for="note">Ghi chú:</label><br />
      <textarea
        id="note"
        rows="3"
        placeholder="Nhập ghi chú (nếu có)"
      ></textarea>

      <h2>Thông tin giao hàng</h2>

      <label for="date">Ngày giao hàng:</label><br />
      <input type="date" id="date" name="date" min="2026-04-26" />

      <br /><br />

      <label for="time">Khung giờ:</label><br />
      <select id="time" name="time">
        <option>Sáng 8-12h</option>
        <option>Chiều 14-18h</option>
        <option>Tối 18-21h</option>
      </select>

      <br /><br />

      <label for="range">Thời gian giao (ngày):</label><br />
      <input type="range" id="range" name="range" min="1" max="7" step="1" />

      <br /><br />

      <button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>
    </form>
  </body>
</html>
