<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Multimedia</title>
  </head>
  <body>
    <h1>Giới thiệu sản phẩm</h1>

    <h2>Hình ảnh sản phẩm</h2>

    <figure>
      <img
        src="./screenshots/cau_B2_ip16promax.jpg"
        alt="iPhone 16 Pro Max"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>iPhone 16 Pro Max</figcaption>
    </figure>

    <figure>
      <img
        src="./screenshots/cau_B2_camera.jpg"
        alt="iPhone 16 với camera"
        loading="lazy"
        style="max-width: 50%; height: auto"
      />
      <figcaption>Camera sắc nét</figcaption>
    </figure>

    <figure>
      <img
        src="./screenshots/cau_B2_hinhanh.jpg"
        alt="Màn hình iPhone 16 hiển thị sắc nét"
        loading="lazy"
        style="max-width: 50%; height: auto"
      />
      <figcaption>Màn hình sắc nét</figcaption>
    </figure>

    <h2>Video giới thiệu (YouTube)</h2>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/RfakDAwVdRw?si=lOgaXIhVG4paQjIj"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h2>Video sản phẩm</h2>

    <video controls poster="https://placehold.co/300x200" width="400">
      <source src="video.mp4" type="video/mp4" />
      <source src="video.webm" type="video/webm" />
      Trình duyệt không hỗ trợ video.
    </video>

    <h2>Âm thanh giới thiệu</h2>

    <audio controls>
      <source src="audio.mp3" type="audio/mpeg" />
      Trình duyệt không hỗ trợ audio.
    </audio>

    <br />

    <svg width="100" height="100">
      <circle cx="50" cy="50" r="40" fill="blue" />
    </svg>
  </body>
</html>
